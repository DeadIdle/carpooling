<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transaction History</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0e0e0e;
      min-height: 100vh;
      padding: 3rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 2rem;
    }

    .brand {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: #f5f5f5;
      letter-spacing: -0.5px;
      margin-bottom: 0.25rem;
    }

    .balance {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
    }

    .balance span {
      color: rgba(255,255,255,0.75);
      font-weight: 500;
    }

    .back {
      display: inline-block;
      margin-top: 0.75rem;
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      transition: color 0.15s;
    }

    .back:hover { color: rgba(255,255,255,0.6); }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }

    thead th {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: left;
      padding: 0 12px 10px;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
    }

    tbody tr {
      border-bottom: 0.5px solid rgba(255,255,255,0.05);
      transition: background 0.1s;
    }

    tbody tr:hover { background: rgba(255,255,255,0.03); }

    tbody td {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      padding: 12px;
    }

    .type-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 4px;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.5);
    }

    .amount { color: #f0f0f0; font-weight: 500; }

    .empty {
      text-align: center;
      padding: 3rem 0;
      font-size: 13px;
      color: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <p class="brand">Transactions</p>
      <p class="balance">Current balance: <span>₹{{ request.user.wallet_balance }}</span></p>
      <a class="back" href="{% url 'passenger_dashboard' %}">← Back to dashboard</a>
    </div>

    {% if Transactions %}
      <table>
        <thead>
          <tr>
            <th>Type</th>
            <th>Amount</th>
            <th>Trip</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          {% for t in Transactions %}
          <tr>
            <td><span class="type-badge">{{ t.transaction_type }}</span></td>
            <td class="amount">₹{{ t.amount }}</td>
            <td>{{ t.trip }}</td>
            <td>{{ t.created_at }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    {% else %}
      <p class="empty">No transactions yet.</p>
    {% endif %}
  </div>
</body>
</html>
