<!DOCTYPE html>
<html>
<head><title>Transaction History</title></head>
<body>
    <h1>Transaction History</h1>
    <p>Current Balance: ₹{{ request.user.wallet_balance }}</p>
    <a href="{% url 'passenger_dashboard' %}">Back to Dashboard</a>

    {% if Transactions %}
        <table border="1">
            <tr>
                <th>Type</th>
                <th>Amount</th>
                <th>Trip</th>
                <th>Date</th>
            </tr>
            {% for t in Transactions %}
            <tr>
                <td>{{ t.transaction_type }}</td>
                <td>₹{{ t.amount }}</td>
                <td>{{ t.trip }}</td>
                <td>{{ t.created_at }}</td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>No transactions yet.</p>
    {% endif %}
</body>
</html>
