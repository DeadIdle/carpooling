<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leave a Review</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0e0e0e;
      min-height: 100vh;
      padding: 3rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 2.5rem;
    }

    .brand {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: #f5f5f5;
      letter-spacing: -0.5px;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
    }

    .subtitle span {
      color: rgba(255,255,255,0.75);
      font-weight: 500;
    }

    .back {
      display: inline-block;
      margin-top: 0.75rem;
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      transition: color 0.15s;
    }

    .back:hover { color: rgba(255,255,255,0.6); }

    .card {
      background: rgba(255,255,255,0.03);
      border: 0.5px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 2rem;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* Star Rating */
    .star-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      flex-direction: row-reverse;
      justify-content: flex-end;
    }

    .star-row input[type="radio"] {
      display: none;
    }

    .star-row label {
      font-size: 32px;
      color: rgba(255,255,255,0.12);
      cursor: pointer;
      transition: color 0.1s, transform 0.1s;
      user-select: none;
    }

    /* Fill stars on hover and check — row-reverse trick */
    .star-row label:hover,
    .star-row label:hover ~ label,
    .star-row input[type="radio"]:checked ~ label,
    .star-row input[type="radio"]:checked + label {
      color: #f0c040;
    }

    .star-row label:hover {
      transform: scale(1.15);
    }

    /* Comment */
    .comment-label {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      display: block;
    }

    textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: rgba(255,255,255,0.8);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 0.75rem 1rem;
      resize: vertical;
      min-height: 100px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1.75rem;
    }

    textarea::placeholder { color: rgba(255,255,255,0.2); }
    textarea:focus { border-color: rgba(255,255,255,0.25); }

    .divider {
      height: 0.5px;
      background: rgba(255,255,255,0.07);
      margin-bottom: 1.75rem;
    }

    .submit-btn {
      width: 100%;
      padding: 0.75rem;
      background: #f5f5f5;
      color: #0e0e0e;
      border: none;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.01em;
    }

    .submit-btn:hover { opacity: 0.85; }

    /* Messages */
    .messages {
      margin-bottom: 1.25rem;
    }

    .msg {
      font-size: 12px;
      padding: 0.6rem 0.9rem;
      border-radius: 5px;
      margin-bottom: 0.5rem;
    }

    .msg.error {
      background: rgba(220, 60, 60, 0.12);
      color: rgba(255, 120, 120, 0.9);
      border: 0.5px solid rgba(220,60,60,0.2);
    }

    .trip-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 1.75rem;
      padding-bottom: 1.25rem;
      border-bottom: 0.5px solid rgba(255,255,255,0.07);
    }

    .trip-meta span { color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <p class="brand">Leave a Review</p>
      <p class="subtitle">Trip from <span>{{ trip.start_node }}</span> to <span>{{ trip.end_node }}</span></p>
      <a class="back" href="{% if request.user.role == 'PS' %}{% url 'passenger_dashboard' %}{% else %}{% url 'driver_dashboard' %}{% endif %}">← Back to dashboard</a>
    </div>

    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="msg error">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}

    <div class="card">
      <div class="trip-meta">
        <span>Driver: <span>{{ trip.driver.username }}</span></span>
        <span>{{ trip.created_at|date:"d M Y" }}</span>
      </div>

      <form method="POST">
        {% csrf_token %}

        <p class="section-label">Your Rating</p>
        <div class="star-row">
          <input type="radio" name="rating" id="s5" value="5">
          <label for="s5">★</label>
          <input type="radio" name="rating" id="s4" value="4">
          <label for="s4">★</label>
          <input type="radio" name="rating" id="s3" value="3">
          <label for="s3">★</label>
          <input type="radio" name="rating" id="s2" value="2">
          <label for="s2">★</label>
          <input type="radio" name="rating" id="s1" value="1">
          <label for="s1">★</label>
        </div>

        <div class="divider"></div>

        <label class="comment-label" for="comment">Comment <span style="color:rgba(255,255,255,0.18); font-size:10px; text-transform:none; letter-spacing:0">(optional)</span></label>
        <textarea id="comment" name="comment" placeholder="How was your experience?"></textarea>

        <button type="submit" class="submit-btn">Submit Review</button>
      </form>
    </div>
  </div>
</body>
</html>
