{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0e0e0e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #161616;
      border: 0.5px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    .brand {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: #f5f5f5;
      letter-spacing: -0.5px;
      margin-bottom: 0.25rem;
    }

    .tagline {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 2rem;
    }

    .error-box {
      font-size: 13px;
      color: #f08080;
      background: rgba(240,128,128,0.1);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 1.25rem;
    }

    .field { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%;
      height: 42px;
      padding: 0 14px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: #1e1e1e;
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #f0f0f0;
      outline: none;
      transition: border-color 0.15s;
    }

    input::placeholder { color: rgba(255,255,255,0.2); }
    input:focus { border-color: rgba(255,255,255,0.3); }

    .btn {
      width: 100%;
      height: 44px;
      margin-top: 0.5rem;
      background: #f0f0f0;
      color: #0e0e0e;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.88; }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: rgba(255,255,255,0.07);
    }

    .divider span {
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .google-btn {
      width: 100%;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: transparent;
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .google-btn:hover {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.2);
      color: #f0f0f0;
    }

    .google-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .footer-links {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
    }

    .footer-links a {
      color: #f0f0f0;
      text-decoration: none;
      font-weight: 500;
    }

    .footer-links a:hover { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="card">
    <p class="brand">Welcome back</p>
    <p class="tagline">Sign in to your account</p>

    {% if messages %}
      <div class="error-box">
        {% for message in messages %}
          <div>{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}

    <form method="POST" action="{% url 'account_login' %}">
      {% csrf_token %}

      <div class="field">
        <label for="id_login">Email</label>
        <input type="email" id="id_login" name="login" placeholder="Your email" required>
      </div>

      <div class="field">
        <label for="id_password">Password</label>
        <input type="password" id="id_password" name="password" placeholder="Your password" required>
      </div>

      <button class="btn" type="submit">Sign in</button>
    </form>

    <div class="divider"><span>or</span></div>

    <a class="google-btn" href="{% provider_login_url 'google' %}">
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </a>

    <div class="footer-links">
      Don't have an account? <a href="{% url 'register' %}">Register</a>
    </div>
  </div>
</body>
</html>
