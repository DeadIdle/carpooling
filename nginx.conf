upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name carpooling.mooo.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name carpooling.mooo.com;

    ssl_certificate /etc/letsencrypt/live/carpooling.mooo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/carpooling.mooo.com/privkey.pem;

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /static/ {
        alias /app/static/;
    }
}