services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: carpooling
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Amu_23122006
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/core/static  # ← added this for UI
    env_file:
      - .env
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static  # ← added this for UI
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:  # ← added this for UI
